{% extends "body.html" %}

{% block allcontent %}
<link rel="stylesheet" href="{{ url_for('static', filename='resourses.css') }}">
<div class="main-container">
    <!-- Resources Header -->
    <header class="resources-header">
        <div class="header-content">
            <div class="page-icon">
                <i class="fas fa-book-open"></i>
            </div>
            <h1 class="page-title">Educatinal Resources</h1>
            
            
            
      </div>
    </header>



    <!-- Main Tabs -->
   <div class="main-tabs">
    <button class="main-tab-btn active" onclick="switchTab('all', this)" data-tab="all">
        <i class="fas fa-th-large"></i> All Resources
    </button>
    <button class="main-tab-btn" onclick="switchTab('videos', this)" data-tab="videos">
        <i class="fas fa-play-circle"></i> Videos
    </button>
    <button class="main-tab-btn" onclick="switchTab('documents', this)" data-tab="documents">
        <i class="fas fa-file-alt"></i> Notes
    </button>
    <button class="main-tab-btn" onclick="switchTab('images', this)" data-tab="images">
        <i class="fas fa-image"></i> Images
    </button>
    <button class="main-tab-btn" onclick="switchTab('audio', this)" data-tab="audio">
        <i class="fas fa-music"></i> questions
    </button>
</div>


    <!-- Filter Bar -->
    <div class="filter-bar">
        <div class="filter-group">
            <div class="search-box">
                <input type="text" id="searchInput" class="form-control" placeholder="Search resources by title, description, or author...">
            </div>
            <select id="courseFilter" class="select-control">
                <option value="">All Courses</option>
                <option value="mathematics">Mathematics</option>
                <option value="science">Science</option>
                <option value="programming">Pyscics</option>
                <option value="business">Business</option>
                <option value="arts">Chemistry</option>
                <option value="languages">Languages</option>
                <option value="general">General</option>
            </select>
            <select id="sortFilter" class="select-control">
                <option value="newest">Newest First</option>
                <option value="oldest">Oldest First</option>
                <option value="largest">Largest Files</option>
                <option value="smallest">Smallest Files</option>
                <option value="popular">Most Popular</option>
            </select>
            <button class="btn btn-primary" onclick="refreshResources()">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
        </div>
    </div>

    <!-- Resources Grid -->
    <div class="content-grid" id="resourcesGrid">
        <!-- Resources will be loaded here -->
    </div>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="loading-spinner" style="display: none;"></div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState" style="display: none;">
        <div class="empty-icon">
            <i class="fas fa-folder-open"></i>
        </div>
        <h3 class="empty-title">No Resources Found</h3>
        <p class="empty-text">No resources have been uploaded yet. Be the first to share educational materials!</p>
        <div class="action-buttons">
            <button class="btn btn-primary" onclick="window.location.href='/upload'">
                <i class="fas fa-cloud-upload-alt"></i> Upload Resources
            </button>
        </div>
    </div>

    <!-- File Preview Modal -->
    <div class="preview-modal" id="previewModal">
        <div class="preview-content" id="previewContent">
            <!-- Preview content will be loaded here -->
        </div>
    </div>
</div>

<script>
/* =====================================================
   GLOBAL STATE
===================================================== */
let allResources = [];
let currentPreviewResource = null;

/* =====================================================
   INIT
===================================================== */
document.addEventListener("DOMContentLoaded", () => {
    setupEventListeners();
    loadAllResources();
});

/* =====================================================
   EVENT LISTENERS
===================================================== */
function setupEventListeners() {
    const searchInput = document.getElementById("searchInput");
    const courseFilter = document.getElementById("courseFilter");
    const sortFilter = document.getElementById("sortFilter");
    const modal = document.getElementById("previewModal");

    if (searchInput) searchInput.addEventListener("input", filterResources);
    if (courseFilter) courseFilter.addEventListener("change", filterResources);
    if (sortFilter) sortFilter.addEventListener("change", filterResources);

    if (modal) {
        modal.addEventListener("click", e => {
            if (e.target.id === "previewModal") closePreview();
        });
    }

    document.addEventListener("keydown", e => {
        if (e.key === "Escape") closePreview();
    });
}

/* =====================================================
   LOAD RESOURCES
===================================================== */
async function loadAllResources() {
    const res = await fetch("/api/resources");
    const data = await res.json();
    allResources = data.resources || [];
    renderResources(getActiveTab());
}

/* =====================================================
   TABS
===================================================== */
function getActiveTab() {
    const active = document.querySelector(".main-tab-btn.active");
    return active ? active.dataset.tab : "all";
}

function switchTab(tab, btn) {
    document.querySelectorAll(".main-tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderResources(tab);
}

/* =====================================================
   FILTERING
===================================================== */
function filterResources() {
    renderResources(getActiveTab());
}

/* =====================================================
   RENDER GRID
===================================================== */
function renderResources(tab = "all") {
    const grid = document.getElementById("resourcesGrid");
    if (!grid) return;

    let list = [...allResources];

    if (tab !== "all") {
        list = list.filter(r => {
            if (tab === "videos") return r.file_category === "video";
            if (tab === "documents") return ["pdf","doc"].includes(r.file_category);
            if (tab === "images") return r.file_category === "image";
            if (tab === "audio") return r.file_category === "audio";
            if (tab === "other") return !["video","pdf","doc","image","audio"].includes(r.file_category);
        });
    }

    grid.innerHTML = list.length
        ? list.map(createResourceCard).join("")
        : "<p style='padding:20px'>No resources found</p>";
}

/* =====================================================
   CARD
===================================================== */
function createResourceCard(r) {
    return `
        <div class="resource-card" onclick="previewResource(${r.id})">
            <div class="resource-thumbnail">
                <img src="${r.thumbnail_url || getDefaultThumbnail()}">
                <span class="resource-badge">${getFileTypeText(r.file_category)}</span>
            </div>
            <div class="resource-content">
                <h3>${r.title}</h3>
            </div>
        </div>
    `;
}

/* =====================================================
   PREVIEW RESOURCE  ✅ HEIGHT FIX
===================================================== */
async function previewResource(id) {
    const res = await fetch(`/api/resources/${id}`);
    const data = await res.json();
    const r = data.resource;

    const modal = document.getElementById("previewModal");
    const content = document.getElementById("previewContent");

    let media = "";

    if (r.file_category === "video") {
        media = `
            <div class="preview-media-wrapper">
                <video id="previewMedia" controls autoplay>
                    <source src="${r.file_url}">
                </video>
            </div>`;
    }
    else if (r.file_category === "audio") {
        media = `
            <div class="preview-media-wrapper">
                <audio id="previewMedia" controls autoplay>
                    <source src="${r.file_url}">
                </audio>
            </div>`;
    }
    else if (r.file_category === "image") {
        media = `
            <div class="preview-media-wrapper">
                <img src="${r.file_url}" style="max-width:100%; max-height:70vh;">
            </div>`;
    }
    else {
        media = `<p>No preview available</p>`;
    }

    content.innerHTML = `
        <div class="preview-header">
            <h2>${r.title}</h2>
            <button onclick="closePreview()">✕</button>
        </div>
        <div class="preview-body">${media}</div>
    `;

    modal.style.display = "block";
    document.body.style.overflow = "hidden";
}

/* =====================================================
   CLOSE PREVIEW  ✅ STOPS AUDIO
===================================================== */
function closePreview() {
    const modal = document.getElementById("previewModal");

    modal.querySelectorAll("video, audio").forEach(m => {
        m.pause();
        m.currentTime = 0;
        m.src = "";
        m.load();
    });

    modal.style.display = "none";
    document.body.style.overflow = "";
    loadAllResources();
}

/* =====================================================
   UTIL
===================================================== */
function getFileTypeText(type) {
    return {
        video:"Video",
        pdf:"Document",
        doc:"Document",
        image:"Image",
        audio:"Audio"
    }[type] || "File";
}

function getDefaultThumbnail() {
    return "https://source.unsplash.com/600x400/?file";
}
</script>

{% endblock %}
